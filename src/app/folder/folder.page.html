<ion-header>

</ion-header>

<ion-content>
  <form #form="ngForm" (ngSubmit)="register(form)">
    <ion-grid>
      <ion-row color="primary" justify-content-center>
        <ion-col align-self-center size-md="6" size-lg="6" size-xs="10">

          <!-- CARD -->
          <ion-card class="dashboard-card">

            <ion-card-header>
              <ion-card-title>
                Información del Cliente
              </ion-card-title>
              <ion-card-subtitle>
                Registra un nuevo cliente en la plataforma You-Pass
              </ion-card-subtitle>
            </ion-card-header>

            <div padding>
              <ion-item>
                <ion-icon name="person-outline" slot="start"></ion-icon>
                <ion-input name="id" type="number" min="101" placeholder="Codigo Cliente"
                  [(ngModel)]="this.cliente"></ion-input>
              </ion-item>
              <ion-item>
                <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
                <ion-input name="name" type="text" placeholder="Nombre Cliente" [(ngModel)]="this.nombre"></ion-input>
              </ion-item>

              <!-- Status -->
              <ion-item>
                <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
                <ion-select label="Status" labelPlacement="floating" [(ngModel)]="status" name="status">
                  <ion-select-option value="activo">
                    Activo
                  </ion-select-option>
                  <ion-select-option value="inactivo">
                    Inactivo
                  </ion-select-option>
                </ion-select>
              </ion-item>

              <ion-item>
                <ion-icon name="globe-outline" slot="start"></ion-icon>
                <ion-label>País</ion-label>
                <ion-select (ionChange)="paisChanged($event)" value="CR" okText="Ok" cancelText="Cancelar">
                  <ion-select-option value="CR">Costa Rica</ion-select-option>
                  <ion-select-option value="GT">Guatemala</ion-select-option>
                  <ion-select-option value="MX">México</ion-select-option>
                  <ion-select-option value="VE">Venezuela</ion-select-option>
                  <ion-select-option value="CO">Colombia</ion-select-option>
                </ion-select>
              </ion-item>

            </div>

          </ion-card>

          <div padding>
            
            <ion-button (click)="postConfirm()" size="small" type="submit" expand="block">
            <ion-icon name="save-outline" slot="start"></ion-icon>
            Registrar</ion-button>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
