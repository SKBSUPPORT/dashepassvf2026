<ion-content class="login-background" fullscreen="true">


  <ion-card>


    <div class="center-wrapper">

      <div class="login-card">


        <ion-card-header>

          <h2>Iniciar sesión</h2>

          <p>Ingrese sus credenciales</p>

        </ion-card-header>

        <ion-item lines="none">
          <ion-icon name="mail-outline" slot="start"></ion-icon>

          <ion-input [(ngModel)]="email" placeholder="Correo">
          </ion-input>

        </ion-item>


        <ion-item lines="none">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>

          <ion-input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'"  placeholder="Contraseña">
          </ion-input>
          <ion-icon slot="end" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" (click)="togglePassword()"
            style="cursor:pointer;">
          </ion-icon>

        </ion-item>


        <ion-button expand="block" (click)="login()">
          Iniciar sesión
        </ion-button>

      </div>

    </div>

  </ion-card>

</ion-content>
