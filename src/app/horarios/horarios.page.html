


<form #form="ngForm" >
  <ion-grid>
    <ion-row color="primary" justify-content-center>
      <ion-col align-self-center size-md="8" size-lg="8" size-xs="8">
        <div padding>
 <!--          <ion-item>
            <ion-input name="id" type="text" placeholder="Codigo Cliente" [(ngModel)]="this.cliente" required>
            </ion-input>
          </ion-item> -->

          <ion-item>
            <ion-label>Cliente</ion-label>
            <ionic-selectable [(ngModel)]="cliente" [ngModelOptions]="{standalone: true}"  [items]="clientes" itemValueField="id" itemTextField="name"
              [canSearch]="true" (onChange)="clienteChange($event)">
            </ionic-selectable>
          </ion-item>

        </div>
        <div padding>

          <input style="display: none" accept=".csv" type="file" (change)="onFileChanged($event)" #fileInput>
          <ion-button *ngIf="this.boton1" size="small" type="submit" expand="block" slot="end"
            (click)="fileInput.click()">
            Cargar
            <ion-icon name="cloud-upload"></ion-icon>
          </ion-button>
          <ion-button *ngIf="this.boton2" color="success" size="small" type="submit" expand="block"
            (click)="validardata()">
            Validar
          </ion-button>
          <ion-button *ngIf="this.boton3" color="success" size="small" type="submit" expand="block"
            (click)="salvardata()">
            Salvar
          </ion-button>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</form>

<ion-content>


  <ion-grid class="ion-text-center">

    <ion-row class="ion-margin">
      <ion-col>
        <ion-title>
          <ion-text color="default">
            Collection horarios
          </ion-text>
        </ion-title>
      </ion-col>
    </ion-row>
    <ion-row class="ion-margin">
      <ion-col >
        <ion-title>
        <ion-text color="danger" >
          {{this.check}}
        </ion-text>
        </ion-title>
      </ion-col>

    </ion-row>



    <ion-row class="header-row">
      <ion-col>
        <ion-text>Inicio</ion-text>
      </ion-col>

      <ion-col>
        <ion-text>Fin</ion-text>
      </ion-col>

      <ion-col>
        <ion-text>Status</ion-text>
      </ion-col>

    </ion-row>


    <ion-row class="header-text" *ngFor="let carga of this.carga">
      <ion-col>
        <ion-text>
          {{carga.START}}
        </ion-text>
      </ion-col>

      <ion-col>
        <ion-text>
          {{carga.END}}
        </ion-text>
      </ion-col>

      <ion-col>
        <ion-text>
          {{carga.STATUS}}
        </ion-text>
      </ion-col>

    </ion-row>

  </ion-grid>
</ion-content>
